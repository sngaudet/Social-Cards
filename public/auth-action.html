<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Verify your email | SocialCards</title>
    <style>
      :root {
        color-scheme: light;
        --bg-top: #d8e7ff;
        --bg-bottom: #f9efe0;
        --card: rgba(255, 253, 251, 0.96);
        --ink: #14213d;
        --muted: #5b6478;
        --accent: #1f4aaa;
        --accent-pressed: #17377d;
        --line: #d7dfef;
        --success: #157347;
        --error: #a11d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 35%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      }

      .card {
        width: min(100%, 460px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(31, 74, 170, 0.18);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 5vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status {
        margin-top: 18px;
        min-height: 48px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #eef3fb;
        color: var(--ink);
      }

      .status.success {
        background: #e8f6ee;
        color: var(--success);
      }

      .status.error {
        background: #fdecec;
        color: var(--error);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 22px;
      }

      button,
      a.button-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 140ms ease,
          opacity 140ms ease,
          background-color 140ms ease;
      }

      button {
        color: #fff;
        background: var(--accent);
      }

      button:hover,
      button:focus-visible {
        background: var(--accent-pressed);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .secondary {
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--line);
      }

      .footer {
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">SocialCards</p>
      <h1>Verify your email</h1>
      <p>
        To avoid mail scanners accidentally consuming one-time links, verification
        only happens after you press the button below.
      </p>

      <div id="status" class="status" role="status" aria-live="polite">
        Preparing your verification request...
      </div>

      <div class="actions">
        <button id="verifyButton" type="button" hidden>Verify email</button>
        <a
          id="continueLink"
          class="button-link secondary"
          href="#"
          hidden
        >
          Continue
        </a>
      </div>

      <p class="footer">
        If this link no longer works, return to the app and request a new
        verification email.
      </p>
    </main>

    <script src="/__/firebase/12.1.0/firebase-app-compat.js"></script>
    <script src="/__/firebase/12.1.0/firebase-auth-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script>
      (function () {
        var statusEl = document.getElementById("status");
        var verifyButton = document.getElementById("verifyButton");
        var continueLink = document.getElementById("continueLink");
        var params = new URLSearchParams(window.location.search);
        var mode = params.get("mode");
        var actionCode = params.get("oobCode");
        var continueUrl = params.get("continueUrl");

        function setStatus(message, tone) {
          statusEl.textContent = message;
          statusEl.className = "status" + (tone ? " " + tone : "");
        }

        if (mode !== "verifyEmail" || !actionCode) {
          setStatus(
            "This verification link is incomplete or unsupported. Please request a new one from the app.",
            "error",
          );
          return;
        }

        setStatus(
          "Press Verify email to complete verification for this account.",
        );
        verifyButton.hidden = false;

        verifyButton.addEventListener("click", function () {
          verifyButton.disabled = true;
          verifyButton.textContent = "Verifying...";
          setStatus("Checking your verification link...");

          firebase
            .auth()
            .applyActionCode(actionCode)
            .then(function () {
              setStatus(
                "Your email has been verified. Return to SocialCards and log in again.",
                "success",
              );
              verifyButton.hidden = true;

              if (continueUrl) {
                continueLink.href = continueUrl;
                continueLink.textContent = "Continue";
                continueLink.hidden = false;
              }
            })
            .catch(function () {
              verifyButton.disabled = false;
              verifyButton.textContent = "Verify email";
              setStatus(
                "This verification link is no longer valid. Request a new verification email from the app and use the newest message.",
                "error",
              );
            });
        });
      })();
    </script>
  </body>
  </html>
