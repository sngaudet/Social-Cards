<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Account action | SocialCards</title>
    <style>
      :root {
        color-scheme: light;
        --bg-top: #d8e7ff;
        --bg-bottom: #f9efe0;
        --card: rgba(255, 253, 251, 0.96);
        --ink: #14213d;
        --muted: #5b6478;
        --accent: #1f4aaa;
        --accent-pressed: #17377d;
        --line: #d7dfef;
        --success: #157347;
        --error: #a11d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 35%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      }

      .card {
        width: min(100%, 460px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(31, 74, 170, 0.18);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 5vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status {
        margin-top: 18px;
        min-height: 48px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #eef3fb;
        color: var(--ink);
      }

      .status.success {
        background: #e8f6ee;
        color: var(--success);
      }

      .status.error {
        background: #fdecec;
        color: var(--error);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 22px;
      }

      .reset-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 22px;
      }

      .field-label {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
      }

      .field-input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        font: inherit;
        color: var(--ink);
        background: #fff;
      }

      .field-input:focus {
        outline: 2px solid rgba(31, 74, 170, 0.2);
        border-color: var(--accent);
      }

      button,
      a.button-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 140ms ease,
          opacity 140ms ease,
          background-color 140ms ease;
      }

      button {
        color: #fff;
        background: var(--accent);
      }

      button:hover,
      button:focus-visible {
        background: var(--accent-pressed);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .secondary {
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--line);
      }

      .footer {
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">SocialCards</p>
      <h1 id="pageTitle">Account action</h1>
      <p id="pageDescription">
        Finish the account action you requested for SocialCards.
      </p>

      <div id="status" class="status" role="status" aria-live="polite">
        Preparing your verification request...
      </div>

      <div class="actions">
        <button id="verifyButton" type="button" hidden>Verify email</button>
        <form id="resetForm" class="reset-form" hidden>
          <label>
            <span class="field-label">New password</span>
            <input
              id="newPassword"
              class="field-input"
              type="password"
              autocomplete="new-password"
              minlength="6"
              required
            />
          </label>

          <label>
            <span class="field-label">Confirm new password</span>
            <input
              id="confirmPassword"
              class="field-input"
              type="password"
              autocomplete="new-password"
              minlength="6"
              required
            />
          </label>

          <button id="resetButton" type="submit">Reset password</button>
        </form>
        <a
          id="continueLink"
          class="button-link secondary"
          href="#"
          hidden
        >
          Continue
        </a>
      </div>

      <p class="footer">
        If this link no longer works, return to the app and request a fresh
        account email.
      </p>
    </main>

    <script src="/__/firebase/12.1.0/firebase-app-compat.js"></script>
    <script src="/__/firebase/12.1.0/firebase-auth-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script>
      (function () {
        var statusEl = document.getElementById("status");
        var pageTitle = document.getElementById("pageTitle");
        var pageDescription = document.getElementById("pageDescription");
        var verifyButton = document.getElementById("verifyButton");
        var resetForm = document.getElementById("resetForm");
        var resetButton = document.getElementById("resetButton");
        var newPasswordInput = document.getElementById("newPassword");
        var confirmPasswordInput = document.getElementById("confirmPassword");
        var continueLink = document.getElementById("continueLink");
        var params = new URLSearchParams(window.location.search);
        var mode = params.get("mode");
        var actionCode = params.get("oobCode");
        var continueUrl = params.get("continueUrl");

        function setStatus(message, tone) {
          statusEl.textContent = message;
          statusEl.className = "status" + (tone ? " " + tone : "");
        }

        function setPageContent(title, description) {
          pageTitle.textContent = title;
          pageDescription.textContent = description;
        }

        function showContinueLink(label) {
          if (!continueUrl) return;
          continueLink.href = continueUrl;
          continueLink.textContent = label || "Continue";
          continueLink.hidden = false;
        }

        if (!actionCode || (mode !== "verifyEmail" && mode !== "resetPassword")) {
          setStatus(
            "This account link is incomplete or unsupported. Please request a new one from the app.",
            "error",
          );
          return;
        }

        if (mode === "verifyEmail") {
          setPageContent(
            "Verify your email",
            "To avoid mail scanners accidentally consuming one-time links, verification only happens after you press the button below.",
          );
          setStatus(
            "Press Verify email to complete verification for this account.",
          );
          verifyButton.hidden = false;

          verifyButton.addEventListener("click", function () {
            verifyButton.disabled = true;
            verifyButton.textContent = "Verifying...";
            setStatus("Checking your verification link...");

            firebase
              .auth()
              .applyActionCode(actionCode)
              .then(function () {
                setStatus(
                  "Your email has been verified. Return to SocialCards and log in again.",
                  "success",
                );
                verifyButton.hidden = true;
                showContinueLink("Continue");
              })
              .catch(function () {
                verifyButton.disabled = false;
                verifyButton.textContent = "Verify email";
                setStatus(
                  "This verification link is no longer valid. Request a new verification email from the app and use the newest message.",
                  "error",
                );
              });
          });

          return;
        }

        setPageContent(
          "Reset your password",
          "Choose a new password for your SocialCards account below.",
        );
        setStatus("Checking your password reset link...");

        firebase
          .auth()
          .verifyPasswordResetCode(actionCode)
          .then(function (email) {
            resetForm.hidden = false;
            setStatus(
              "Enter a new password for " + email + " to finish resetting your account.",
            );
          })
          .catch(function () {
            setStatus(
              "This password reset link is no longer valid. Return to the app and request a new password reset email.",
              "error",
            );
          });

        resetForm.addEventListener("submit", function (event) {
          event.preventDefault();

          var newPassword = newPasswordInput.value;
          var confirmPassword = confirmPasswordInput.value;

          if (newPassword.length < 6) {
            setStatus("Your new password must be at least 6 characters long.", "error");
            return;
          }

          if (newPassword !== confirmPassword) {
            setStatus("Your passwords do not match. Enter them again.", "error");
            return;
          }

          resetButton.disabled = true;
          resetButton.textContent = "Resetting...";
          setStatus("Saving your new password...");

          firebase
            .auth()
            .confirmPasswordReset(actionCode, newPassword)
            .then(function () {
              setStatus(
                "Your password has been reset. Return to SocialCards and log in with your new password.",
                "success",
              );
              resetForm.hidden = true;
              showContinueLink("Back to app");
            })
            .catch(function () {
              resetButton.disabled = false;
              resetButton.textContent = "Reset password";
              setStatus(
                "We could not reset your password with this link. Request a new password reset email from the app and try again.",
                "error",
              );
            });
        });
      })();
    </script>
  </body>
  </html>
